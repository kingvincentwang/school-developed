<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羅屋築蹟~書院足跡 - 有聲書 (科技本地版)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
            /* 深藍科技漸層背景 */
            background: radial-gradient(circle at top right, #0f172a, #1e3a8a, #020617);
            background-attachment: fixed;
        }
        
        /* 玻璃質感自訂類別 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        
        .glass-header {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(30, 58, 138, 0.4));
            border-bottom: 1px solid rgba(147, 197, 253, 0.2);
        }

        .glass-button {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.3);
            backdrop-filter: blur(4px);
        }
        
        .glass-button:hover:not(:disabled) {
            background: rgba(56, 189, 248, 0.25);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        /* 內容切換動畫 */
        .page-transition {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .fade-out {
            opacity: 0;
            transform: translateX(20px);
        }
        .fade-in {
            opacity: 1;
            transform: translateX(0);
        }

        /* 滾動條美化 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(56, 189, 248, 0.4); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(56, 189, 248, 0.6); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 md:p-8 text-slate-100">

    <!-- 主容器：玻璃質感 -->
    <div class="max-w-5xl w-full glass-panel rounded-3xl overflow-hidden flex flex-col h-[90vh] md:h-[650px] relative">
        
        <!-- 頂部標題列 -->
        <div class="glass-header p-4 flex items-center justify-center shadow-lg z-10">
            <i class="fas fa-book-journal-whills text-cyan-400 text-2xl mr-3"></i>
            <h1 class="text-xl md:text-2xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-blue-400 drop-shadow-sm">
                羅屋築蹟~書院足跡
            </h1>
        </div>

        <!-- 書本內容區 -->
        <div class="flex-grow overflow-hidden p-6 md:p-10 relative z-0" id="content-container">
            <div id="page-content" class="page-transition fade-in flex flex-col md:flex-row h-full">
                <!-- 圖片展示區 (左側，寬度比例 1/3) -->
                <div id="image-container" class="w-full md:w-1/3 h-48 md:h-full bg-black/30 rounded-2xl flex items-center justify-center mb-6 md:mb-0 md:mr-8 shadow-inner border border-blue-500/20 relative overflow-hidden group flex-shrink-0">
                    <div class="absolute inset-0 bg-gradient-to-t from-blue-900/40 to-transparent opacity-50 z-10 pointer-events-none"></div>
                    <!-- 本地圖片，加入 onerror 防呆（找不到會顯示精美科技感佔位圖） -->
                    <img id="page-image" src="images/p01.png" alt="故事圖片" class="w-full h-full object-contain relative z-0" onerror="this.src='https://placehold.co/800x600/0f172a/38bdf8?text=羅屋築蹟+書院足跡'">
                </div>
                
                <!-- 文字內容 (右側，寬度比例 2/3) -->
                <div class="w-full md:w-2/3 flex flex-col overflow-y-auto h-full pr-2">
                    <div id="text-container" class="text-lg md:text-2xl leading-relaxed md:leading-loose text-blue-50 tracking-wide text-justify font-light text-shadow-sm my-auto">
                        <!-- 內容由 JS 動態載入 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 播放控制與導覽列 -->
        <div class="bg-slate-900/60 backdrop-blur-xl border-t border-blue-500/20 p-4 md:p-6 z-10 flex flex-col shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
            
            <!-- 選項與下載區 -->
            <div class="flex justify-between items-center mb-4">
                <label class="relative inline-flex items-center cursor-pointer group" title="開啟後，讀完當頁會自動翻到下一頁繼續唸">
                    <input type="checkbox" id="auto-play-toggle" class="sr-only peer" checked>
                    <div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-gray-300 after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-cyan-500 peer-checked:after:bg-white shadow-inner"></div>
                    <span class="ml-3 text-sm md:text-base font-medium text-cyan-200 group-hover:text-cyan-100 transition-colors">自動換頁播放</span>
                </label>
                
                <button id="download-audio-btn" class="text-sm md:text-base text-cyan-300 glass-button px-3 py-2 rounded-lg flex items-center transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="fas fa-download mr-2"></i> <span id="download-text">下載本頁音檔</span>
                </button>
            </div>

            <!-- 進度條 -->
            <div class="w-full bg-slate-800 rounded-full h-1.5 mb-5 shadow-inner border border-white/5 overflow-hidden">
                <div id="progress-bar" class="bg-gradient-to-r from-blue-500 to-cyan-400 h-1.5 rounded-full transition-all duration-300 shadow-[0_0_10px_rgba(34,211,238,0.8)]" style="width: 10%;"></div>
            </div>

            <div class="flex justify-between items-center">
                <!-- 上一頁按鈕 -->
                <button id="prev-btn" class="glass-button text-cyan-200 p-2 md:px-4 md:py-2 rounded-lg flex items-center text-sm md:text-base font-bold disabled:opacity-30 disabled:cursor-not-allowed">
                    <i class="fas fa-chevron-left mr-2"></i> 上一頁
                </button>

                <!-- 播放控制按鈕群 -->
                <div class="flex space-x-4 items-center">
                    <button id="stop-btn" class="w-10 h-10 md:w-12 md:h-12 glass-button text-cyan-200 rounded-full flex items-center justify-center shadow-sm" title="停止">
                        <i class="fas fa-stop"></i>
                    </button>
                    
                    <button id="play-btn" class="w-14 h-14 md:w-16 md:h-16 bg-cyan-500/30 border border-cyan-400 text-cyan-100 rounded-full flex items-center justify-center text-2xl hover:bg-cyan-400/50 transition-all transform hover:scale-105 shadow-[0_0_20px_rgba(34,211,238,0.3)] disabled:opacity-50" title="播放">
                        <i class="fas fa-play ml-1"></i>
                    </button>
                    
                    <button id="pause-btn" class="w-14 h-14 md:w-16 md:h-16 bg-blue-500/40 border border-blue-400 text-cyan-100 rounded-full items-center justify-center text-2xl hover:bg-blue-400/60 transition-all transform hover:scale-105 shadow-[0_0_20px_rgba(59,130,246,0.3)] hidden" title="暫停">
                        <i class="fas fa-pause"></i>
                    </button>
                </div>

                <!-- 下一頁按鈕 -->
                <button id="next-btn" class="glass-button text-cyan-200 p-2 md:px-4 md:py-2 rounded-lg flex items-center text-sm md:text-base font-bold disabled:opacity-30 disabled:cursor-not-allowed">
                    下一頁 <i class="fas fa-chevron-right ml-2"></i>
                </button>
            </div>
            
            <!-- 頁碼顯示 -->
            <div class="text-center text-xs md:text-sm text-cyan-500/70 mt-4 font-mono tracking-widest">
                PAGE <span id="page-indicator">1 / 10</span>
            </div>
        </div>
    </div>

    <!-- 提示訊息 Toast -->
    <div id="toast" class="fixed bottom-6 right-6 bg-slate-800/90 backdrop-blur-md border border-cyan-500/30 text-cyan-100 px-5 py-3 rounded-xl shadow-[0_0_20px_rgba(0,0,0,0.5)] opacity-0 transition-opacity duration-300 pointer-events-none z-50 flex items-center">
        <i class="fas fa-info-circle mr-3 text-cyan-400"></i>
        <span id="toast-msg">提示訊息</span>
    </div>

    <script>
        // 電子書內容資料 (羅屋築蹟~書院足跡) - 已清除內部重複的換行符號
        const bookData = [
            {
                imageDesc: "古樸的羅屋築蹟書本封面",
                text: "《羅屋築蹟~書院足跡》\n作者: Vincent Wang"
            },
            {
                imageDesc: "宏偉的羅屋書院與一堂四橫建築格局",
                text: "晨曦微露，小曦跟著羅德公來到了關西。眼前這座宏偉的建築，便是遠近聞名的「羅屋書院」。\n羅德公指著前方的建築群說：「小曦，你看這『一堂四橫』的格局，就像一個大大的『回』字，把家族的向心力都圍在了這裡。」\n羅屋書院不僅是居住的地方，更是後代子孫讀書明理的聖殿。"
            },
            {
                imageDesc: "羅德公拿著泛黃的遷徙圖向小曦解說",
                text: "「我們羅家的祖先是羅珠公，」羅德公拿出一張泛黃的遷徙圖，向小曦講述客家人如何翻山越嶺、跨越海峽來到這片土地。\n為了讓後代有更好的生活，祖先們胼手胝足，在農忙之餘也不忘建立書院。這每一塊磚頭、每一片瓦，都承載著客家人重視教育、耕讀傳家的精神。"
            },
            {
                imageDesc: "正廳上方懸掛的豫章堂匾額",
                text: "他們走進正廳，上方懸掛著「豫章堂」的匾額。\n羅德公緩緩說道：「豫章是我們羅氏的郡望。這三個字提醒著我們，無論走得多遠，都不能忘記自己的根。這裡不僅是祭祀祖先的地方，更是族人聚會、傳承教誨的核心。」\n小曦感受到一種莊嚴的力量，彷彿祖先們正溫柔地注視著他們。"
            },
            {
                imageDesc: "精緻的得月樓與窗邊的月色",
                text: "接著，小曦跑向一旁的「得月樓」。這座精緻的小樓曾是文人雅士吟詩作對的地方。\n羅德公笑著說：「取名『得月』，是因為這裡地勢高，能最早看見月亮，寓意著『近水樓台先得月』，鼓勵學子們要捷足先登，勤奮求學。」\n小曦想像著古人在窗邊對月誦經的模樣，眼裡閃爍著光芒。"
            },
            {
                imageDesc: "簷下精細的三顧茅廬木雕",
                text: "羅德公帶著小曦靠近簷下的橫樑，指著精細的木雕說：「你看這齣戲，叫做『三顧茅廬』。」\n木頭上雕刻著劉備誠心邀請諸葛亮的場景，人物的神神栩栩如生。\n羅德公叮嚀：「這是在教導我們，求學問要有誠意，對待有才德的人要謙卑恭敬。」"
            },
            {
                imageDesc: "牆基精彩的八仙過海石雕",
                text: "小曦蹲下身子，發現牆基的石雕同樣精彩。那是「八仙過海」的故事，每位仙人手持不同的法寶，姿態各異。\n羅德公說：「這些石雕不僅是美觀，還寓意著『各顯神通』，每個人都有自己的天賦，只要肯努力，一定能找到屬於自己的路。」"
            },
            {
                imageDesc: "羅德公與小曦走在古樸的長廊上",
                text: "走在長廊上，羅德公語重心長地唸出了一句客家諺語：「子弟不讀書，好比無目珠。」\n他解釋說，不讀書的人就像沒有眼睛一樣，看不清世界的道理。\n小曦點點頭，心裡默默記下了這句話，深深體會到客家長輩對子孫受教育的殷切期盼。"
            },
            {
                imageDesc: "書院外翠綠的農村景觀與稻田",
                text: "走出建築物，放眼望去是一片翠綠的農村景觀。\n羅德公說：「這就是『耕讀傳家』。白天在田裡辛苦耕作，晚上在燈下讀書。大自然是最好的教室，而書院則是用以傳授學問的殿堂。」"
            },
            {
                imageDesc: "夕陽將羅屋書院染成金紅色，小曦踏上歸途",
                text: "參訪結束了，小曦回頭望向羅屋書院，夕陽將古老的牆角染成了金紅色。\n他心裡想：這些「築蹟」不じる是石頭與木頭，更是前人留下的智慧與叮嚀。\n他背好書包，跟著羅德公的腳步，踏上回家的路，準備在未來的日子裡，走出屬於自己的書院足跡。"
            }
        ];

        // 系統狀態
        let currentPageIndex = 0;
        let isPlaying = false;
        let isAutoPlayEnabled = true;

        // 音訊實例
        const audioPlayer = new Audio();
        
        // DOM 元素
        const contentContainer = document.getElementById('page-content');
        const textContainer = document.getElementById('text-container');
        const pageImage = document.getElementById('page-image');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const playBtn = document.getElementById('play-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const stopBtn = document.getElementById('stop-btn');
        const pageIndicator = document.getElementById('page-indicator');
        const progressBar = document.getElementById('progress-bar');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toast-msg');
        const autoPlayToggle = document.getElementById('auto-play-toggle');
        const downloadAudioBtn = document.getElementById('download-audio-btn');

        // 音訊播放完畢事件：自動換頁邏輯
        audioPlayer.onended = () => {
            if (isAutoPlayEnabled && currentPageIndex < bookData.length - 1) {
                // 自動換到下一頁並繼續播放
                nextPage(true); 
            } else {
                // 停止播放狀態
                isPlaying = false;
                updatePlayButtonsUI();
            }
        };

        // 如果音檔載入錯誤 (例如找不到檔案)
        audioPlayer.onerror = () => {
            console.error("無法載入或播放音檔");
            showToast("找不到對應的本地音檔！請確認 wav/ 資料夾內是否有對應的 wav 檔案。");
            isPlaying = false;
            updatePlayButtonsUI();
        };

        autoPlayToggle.addEventListener('change', (e) => {
            isAutoPlayEnabled = e.target.checked;
        });

        // 渲染頁面內容
        function renderPage() {
            contentContainer.classList.remove('fade-in');
            contentContainer.classList.add('fade-out');

            setTimeout(() => {
                const pageData = bookData[currentPageIndex];
                
                // 設定本地圖片路徑 (images/p01.png ~ images/p10.png)
                const pageNum = String(currentPageIndex + 1).padStart(2, '0');
                pageImage.src = `images/p${pageNum}.png`;
                pageImage.alt = pageData.imageDesc;
                
                // 完美去除所有連續空行：將任何連續的 \n 合併替換為單個 <br>
                textContainer.innerHTML = pageData.text.replace(/\n+/g, '<br>');
                pageIndicator.innerText = `${currentPageIndex + 1} / ${bookData.length}`;
                
                const progressPercentage = ((currentPageIndex + 1) / bookData.length) * 100;
                progressBar.style.width = `${progressPercentage}%`;

                prevBtn.disabled = currentPageIndex === 0;
                nextBtn.disabled = currentPageIndex === bookData.length - 1;

                contentContainer.classList.remove('fade-out');
                contentContainer.classList.add('fade-in');
            }, 200); 
        }

        // --- 播放與控制邏輯 (直接播放 `./wav/` 底下檔案) ---

        async function playAudio() {
            // 如果是暫停狀態，直接恢復播放
            if (audioPlayer.src && audioPlayer.paused && audioPlayer.currentTime > 0) {
                await audioPlayer.play();
                isPlaying = true;
                updatePlayButtonsUI();
                return;
            }

            try {
                // 設定本地音檔路徑 (wav/01.wav ~ wav/10.wav)
                const pageNum = String(currentPageIndex + 1).padStart(2, '0');
                const audioUrl = `wav/${pageNum}.wav`;
                
                // 載入並播放 (如果來源不同才重新指定)
                if (!audioPlayer.src.endsWith(audioUrl)) {
                    audioPlayer.src = audioUrl;
                }
                
                await audioPlayer.play();
                isPlaying = true;
                updatePlayButtonsUI();

            } catch (error) {
                console.error("Audio playback failed:", error);
                showToast("音檔播放失敗，請確認 wav 資料夾下是否有對應檔案。");
                isPlaying = false;
                updatePlayButtonsUI();
            }
        }

        function pauseAudio() {
            if (isPlaying) {
                audioPlayer.pause();
                isPlaying = false;
                updatePlayButtonsUI();
            }
        }

        function stopAudio() {
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
            isPlaying = false;
            updatePlayButtonsUI();
        }

        function updatePlayButtonsUI() {
            if (isPlaying) {
                playBtn.classList.add('hidden');
                pauseBtn.classList.remove('hidden');
                pauseBtn.style.display = 'flex'; 
            } else {
                pauseBtn.classList.add('hidden');
                playBtn.classList.remove('hidden');
                playBtn.style.display = 'flex';
            }
        }

        // --- 換頁邏輯 ---

        function prevPage() {
            if (currentPageIndex > 0) {
                currentPageIndex--;
                handlePageChange();
            }
        }

        function nextPage(autoContinue = false) {
            if (currentPageIndex < bookData.length - 1) {
                currentPageIndex++;
                handlePageChange(autoContinue);
            }
        }

        function handlePageChange(autoContinue = false) {
            const wasPlaying = isPlaying;
            stopAudio(); 
            renderPage();
            
            // 若為自動播放串聯，或原先就處於播放狀態，切換後自動開始播下一頁
            if (wasPlaying || autoContinue) {
                // 給一點點視覺切換緩衝時間再發聲
                setTimeout(() => {
                    playAudio();
                }, 400);
            }
        }

        // --- 下載邏輯 ---

        async function downloadCurrentPageAudio() {
            const pageNum = String(currentPageIndex + 1).padStart(2, '0');
            const audioUrl = `wav/${pageNum}.wav`;
            
            try {
                // 建立下載連結指向實體檔案
                const a = document.createElement('a');
                a.href = audioUrl;
                a.download = `羅屋築蹟_第${pageNum}頁.wav`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                showToast(`已開始下載第 ${currentPageIndex + 1} 頁音檔！`);

            } catch (error) {
                showToast("下載失敗，請檢查檔案是否存在。");
            }
        }

        function showToast(msg) {
            toastMsg.innerText = msg;
            toast.classList.remove('opacity-0');
            setTimeout(() => {
                toast.classList.add('opacity-0');
            }, 3000);
        }

        // 事件綁定
        prevBtn.addEventListener('click', () => prevPage());
        nextBtn.addEventListener('click', () => nextPage());
        playBtn.addEventListener('click', playAudio);
        pauseBtn.addEventListener('click', pauseAudio);
        stopBtn.addEventListener('click', stopAudio);
        downloadAudioBtn.addEventListener('click', downloadCurrentPageAudio);

        // 鍵盤左右鍵支援換頁
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') prevPage();
            if (e.key === 'ArrowRight') nextPage();
        });

        // 初始化
        window.onload = () => {
            renderPage();
        };

    </script>
</body>
</html>
